<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobcord — Bulk Export</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --shell-bg: #202225;
      --server-bg: #202225;
      --channel-bg: #2f3136;
      --channel-header-bg: #2f3136;
      --topbar-bg: #36393f;
      --main-bg: #36393f;
      --channel-active: rgba(79, 84, 92, 0.6);
      --channel-hover: rgba(79, 84, 92, 0.3);
      --text-primary: #fff;
      --text-secondary: #b9bbbe;
      --text-muted: #72767d;
      --text-channels: #8e9297;
      --separator: rgba(255, 255, 255, 0.06);
      --scrollbar-thumb: #202225;
      --scrollbar-track: #2f3136;
    }

    .light-shell {
      --shell-bg: #e3e5e8;
      --server-bg: #e3e5e8;
      --channel-bg: #f2f3f5;
      --channel-header-bg: #f2f3f5;
      --topbar-bg: #ffffff;
      --main-bg: #ffffff;
      --channel-active: rgba(0, 0, 0, 0.06);
      --channel-hover: rgba(0, 0, 0, 0.03);
      --text-primary: #060607;
      --text-secondary: #4f5660;
      --text-muted: #5c6470;
      --text-channels: #5c6470;
      --separator: rgba(0, 0, 0, 0.06);
      --scrollbar-thumb: #c4c9ce;
      --scrollbar-track: #e3e5e8;
    }

    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--shell-bg); }

    .discord-shell {
      display: grid;
      grid-template-columns: 72px 240px 1fr;
      height: 100vh;
      background: var(--shell-bg);
    }

    /* ── Server Sidebar ── */
    .server-sidebar {
      background: var(--server-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 12px;
      gap: 8px;
      overflow-y: auto;
    }

    .server-sidebar::-webkit-scrollbar { width: 0; }

    .server-icon-home {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: var(--channel-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-radius 200ms ease, background 200ms ease;
    }

    .server-icon-home:hover {
      border-radius: 12px;
      background: #5865f2;
      color: #fff;
    }

    .server-separator {
      width: 32px;
      height: 2px;
      background: var(--separator);
      border-radius: 1px;
    }

    .server-icon {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      transition: border-radius 200ms ease;
    }

    .server-icon:hover { border-radius: 16px; }

    .server-icon-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .server-icon-placeholder {
      width: 100%;
      height: 100%;
      background: var(--channel-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      color: var(--text-primary);
    }

    .server-icon:hover .server-icon-placeholder { background: #5865f2; color: #fff; }

    /* ── Channel Sidebar ── */
    .channel-sidebar {
      background: var(--channel-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .channel-sidebar-header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      flex-shrink: 0;
    }

    .server-header-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    .channel-list::-webkit-scrollbar-track { background: transparent; }

    .channel-category {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 16px 8px 4px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-channels);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      cursor: default;
    }

    .category-arrow { font-size: 10px; }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      margin: 1px 8px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-channels);
      font-size: 15px;
      transition: background 100ms ease, color 100ms ease;
    }

    .channel-item:hover {
      background: var(--channel-hover);
      color: var(--text-secondary);
    }

    .channel-item.active {
      background: var(--channel-active);
      color: var(--text-primary);
    }

    .channel-item.disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .channel-hash {
      font-size: 18px;
      font-weight: 400;
      opacity: 0.5;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .channel-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* DM items */
    .dm-item { gap: 10px; padding: 8px; }

    .dm-avatar, .dm-avatar-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
    }

    .dm-avatar-placeholder {
      background: var(--channel-active);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: #fff;
    }

    /* User status bar */
    .user-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid rgba(0, 0, 0, 0.2);
      flex-shrink: 0;
    }

    .user-status-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5865f2, #7289da);
      flex-shrink: 0;
    }

    .user-status-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: block;
    }

    .user-status-detail {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
    }

    /* ── Top Bar ── */
    .shell-topbar {
      height: 48px;
      background: var(--topbar-bg);
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar-channel-icon {
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .topbar-channel-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shell-theme-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 150ms ease, background 150ms ease;
    }

    .shell-theme-toggle:hover {
      color: var(--text-primary);
      background: var(--channel-hover);
    }

    /* ── Main Content ── */
    .shell-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--main-bg);
    }

    .shell-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }


    .shell-content-iframe {
      overflow: hidden;
      padding: 0;
    }


    .shell-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .discord-shell {
        grid-template-columns: 1fr;
      }
      .server-sidebar, .channel-sidebar {
        display: none;
      }
    }

    /* ── Print ── */
    @media print {
      .server-sidebar, .channel-sidebar, .shell-topbar { display: none !important; }
      .discord-shell { display: block; }
      .shell-content { overflow: visible; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="discord-shell">
    
    <div class="server-sidebar">
      <div class="server-icon-home" title="Home">
        <svg width="28" height="20" viewBox="0 0 28 20"><path fill="currentColor" d="M23.0212 1.67671C21.3107 0.879656 19.5079 0.318797 17.6584 0C17.4062 0.461742 17.1749 0.934541 16.9708 1.4184C15.003 1.12145 12.9974 1.12145 11.0292 1.4184C10.8251 0.934541 10.5765 0.461742 10.3416 0C8.49079 0.318797 6.68533 0.8824 4.9788 1.67933C1.00996 7.92987 -0.0602092 14.0315 0.488283 20.0515C2.72065 21.7527 4.92398 22.7769 7.0925 23.4557C7.5691 22.8175 7.99568 22.1394 8.36294 21.4266C7.6823 21.1579 7.02723 20.8332 6.40461 20.4568C6.56213 20.3417 6.71698 20.2236 6.8672 20.1043C12.1765 22.5752 17.9553 22.5752 23.1939 20.1043C23.3454 20.2236 23.5003 20.3417 23.6553 20.4568C23.03 20.8345 22.3736 21.1592 21.6943 21.4266C22.0616 22.1394 22.4869 22.8175 22.9648 23.4557C25.1346 22.7769 27.3393 21.7527 29.5765 20.0515C30.2075 13.0568 28.5579 6.99907 23.0212 1.67671Z"/></svg>
      </div>
      <div class="server-separator"></div>
      <div class="server-icon" title="Bobcord">
        <img src="https://cdn.discordapp.com/icons/1396498321660444834/224516460ecf45e1d18ac4cbd281f868.png" alt="Bobcord" class="server-icon-img">

    <div class="channel-sidebar">

      <div class="shell-content shell-content-iframe">

  </div>
  <script>
(function() {
  'use strict';

  var channels = [{"id":"1396504198824198244","name":"﹨rules﹨","filename":"rules/rules-page-1.html"},{"id":"1446142650469191895","name":"﹨apply﹨","filename":"apply/apply-page-1.html"},{"id":"1465599794071474176","name":"﹨boberal﹨","filename":"boberal/boberal-page-1.html"},{"id":"1494063026733842696","name":"﹨art﹨","filename":"art/art-page-1.html"},{"id":"1396501859744616528","name":"﹨announcements﹨","filename":"announcements/announcements-page-1.html"},{"id":"1396501953495961620","name":"﹨voting﹨","filename":"voting/voting-page-1.html"}];
  var isBulk = true;

  // Theme toggle
  var themeToggle = document.getElementById('shell-theme-toggle');
  var THEME_KEY = 'discrub-shell-theme';

  function applyTheme(isLight) {
    document.documentElement.classList.toggle('light-shell', isLight);
    if (themeToggle) themeToggle.textContent = isLight ? '☀' : '☾';

    // Sync theme to content iframe via postMessage (works cross-origin and sandboxed)
    var frame = document.getElementById('channel-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'discrub-theme', isLight: isLight }, '*');
    }
  }

  try {
    if (localStorage.getItem(THEME_KEY) === 'light') applyTheme(true);
  } catch(e) {}

  if (themeToggle) {
    themeToggle.addEventListener('click', function() {
      var isLight = !document.documentElement.classList.contains('light-shell');
      applyTheme(isLight);
      try { localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark'); } catch(e) {}
    });
  }

  // Sync theme to iframe when it loads (re-send current theme)
  var frame = document.getElementById('channel-frame');
  if (frame) {
    frame.addEventListener('load', function() {
      var isLight = document.documentElement.classList.contains('light-shell');
      if (frame.contentWindow) {
        frame.contentWindow.postMessage({ type: 'discrub-theme', isLight: isLight }, '*');
      }
    });
  }

  // Listen for theme changes from iframe content (when content's own toggle is used)
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'discrub-theme' && typeof e.data.isLight === 'boolean') {
      var isLight = e.data.isLight;
      document.documentElement.classList.toggle('light-shell', isLight);
      if (themeToggle) themeToggle.textContent = isLight ? '☀' : '☾';
      try { localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark'); } catch(e) {}
    }
  });

  // Channel navigation (bulk mode only)
  if (isBulk) {
    var channelItems = document.querySelectorAll('.channel-item');
    var iframe = document.getElementById('channel-frame');
    var topbarName = document.getElementById('topbar-channel-name');

    function activateChannel(channelId) {
      var channel = channels.find(function(c) { return c.id === channelId; });
      if (!channel || !iframe) return;

      iframe.src = channel.filename;
      if (topbarName) topbarName.textContent = channel.name;

      channelItems.forEach(function(item) {
        item.classList.toggle('active', item.getAttribute('data-channel-id') === channelId);
      });

      try { location.hash = 'channel-' + channelId; } catch(e) {}
    }

    channelItems.forEach(function(item) {
      item.addEventListener('click', function() {
        var id = item.getAttribute('data-channel-id');
        if (id) activateChannel(id);
      });
    });

    // Load channel from hash on page load
    var hash = location.hash.replace('#channel-', '');
    if (hash && channels.some(function(c) { return c.id === hash; })) {
      activateChannel(hash);
    }
  }
})();
</script>
</body>
